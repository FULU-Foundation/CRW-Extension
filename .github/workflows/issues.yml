name: Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for opening an issue! Before it can be reviewed, please ensure you have read the [CONTRIBUTING.md](https://github.com/FULU-Foundation/CRW-Extension/blob/main/CONTRIBUTING.md) file and checked that your issue follows the required format. Issues that do not will be closed without review."
            })
